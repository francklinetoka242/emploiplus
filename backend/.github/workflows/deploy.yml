name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          # 💡 Utilisez la clé privée au lieu du mot de passe
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }} # Assurez-vous que ce secret existe
          script: |
            # 💡 Vérifiez bien ce chemin !
            cd /var/www/emploi-connect 
            git pull origin main
            
            # Mise à jour du Backend
            cd backend
            npm install
            pm2 restart all || pm2 start server.js --name "backend"
            
            # Mise à jour du Frontend (Build)
            cd ../frontend
            npm install
            npm run build