# ============================================
# Apache Reverse Proxy Configuration
# Configuration pour fronter le Backend Node.js
# ============================================

# 1️⃣ ACTIVE MOD_PROXY (dans apache2/mods-enabled)
# sudo a2enmod proxy
# sudo a2enmod proxy_http
# sudo a2enmod rewrite
# sudo a2enmod headers

# 2️⃣ AJOUTE CETTE CONFIGURATION DANS:
#     /etc/apache2/sites-available/emploiplus-group.com.conf
#     OU pour XAMPP: /Applications/XAMPP/etc/httpd/conf.d/

# ============================================
# VirtualHost Configuration
# ============================================

<VirtualHost *:80>
    ServerName emploiplus-group.com
    ServerAlias www.emploiplus-group.com
    ServerAdmin admin@emploiplus-group.com
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/emploiplus-error.log
    CustomLog ${APACHE_LOG_DIR}/emploiplus-access.log combined
    
    # 🔄 REVERSE PROXY: /api → Backend Node.js:5000
    <Location /api>
        ProxyPreserveHost On
        ProxyPass http://127.0.0.1:5000/api
        ProxyPassReverse http://127.0.0.1:5000/api
        
        # Headers pour WebSocket (si utilisé)
        Header set Upgrade %{HTTP_UPGRADE}e
        Header set Connection "Upgrade"
    </Location>
    
    # ⚠️  Frontend SPA (désormais utilise HashRouter, donc pas besoin de rewrite)
    DocumentRoot /Applications/XAMPP/xamppfiles/htdocs/Emploises/emploi-connect-/dist
    
    <Directory /Applications/XAMPP/xamppfiles/htdocs/Emploises/emploi-connect-/dist>
        Options -MultiViews
        HeadersAdd Cache-Control "public, max-age=3600"
        
        # Avec HashRouter, pas de rewrite nécessaire
        # Les URL seront: https://example.com/#/formations
    </Directory>
    
    # Compaction Gzip côté serveur
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
        AddOutputFilter DEFLATE js css svg
        
        # Écarter MIME types problématiques
        BrowserMatch ^Mozilla/4 gzip-only-text/html
    </IfModule>
    
    # Headers de Sécurité
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    
    # HSTS (HTTPS seulement - activé si certif SSL)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
</VirtualHost>

# ============================================
# HTTPS Configuration (avec Let's Encrypt)
# ============================================

<VirtualHost *:443>
    ServerName emploiplus-group.com
    ServerAlias www.emploiplus-group.com
    ServerAdmin admin@emploiplus-group.com
    
    # 🔐 SSL Certificates (Let's Encrypt via CyberPanel)
    SSLEngine on
    SSLCertificateFile /path/to/your/certificate.crt
    SSLCertificateKeyFile /path/to/your/private.key
    SSLCertificateChainFile /path/to/your/chain.crt
    
    # Modern SSL Configuration
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder on
    SSLCompression off
    
    # Logs
    ErrorLog ${APACHE_LOG_DIR}/emploiplus-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/emploiplus-ssl-access.log combined
    
    # 🔄 REVERSE PROXY: /api → Backend Node.js:5000
    <Location /api>
        ProxyPreserveHost On
        ProxyPass http://127.0.0.1:5000/api
        ProxyPassReverse http://127.0.0.1:5000/api
        
        # Garder les headers HTTP essentiels
        SetEnvIf Request_URI ".*" REMOTE_ADDR=%{REMOTE_ADDR}e
        
        # Support WebSocket
        Header set Upgrade %{HTTP_UPGRADE}e env=HTTP_UPGRADE
        Header set Connection "upgrade" env=HTTP_UPGRADE
    </Location>
    
    # Frontend SPA
    DocumentRoot /Applications/XAMPP/xamppfiles/htdocs/Emploises/emploi-connect-/dist
    
    <Directory /Applications/XAMPP/xamppfiles/htdocs/Emploises/emploi-connect-/dist>
        Options -MultiViews
        # Cache assets
        <FilesMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>
        
        # HTML files: no strong caching
        <FilesMatch "\.html$">
            Header set Cache-Control "public, max-age=3600, must-revalidate"
        </FilesMatch>
    </Directory>
    
    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>
    
    # Security Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
</VirtualHost>

# ============================================
# HTTP → HTTPS Redirect
# ============================================

<VirtualHost *:80>
    ServerName emploiplus-group.com
    ServerAlias www.emploiplus-group.com
    
    # Redirect to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# ============================================
# À DÉPLOYER
# ============================================

# 1. Copier ce fichier dans /etc/apache2/sites-available/
# 2. Adapter les chemins de certificats SSL
# 3. Adapter le DocumentRoot
#
#    sudo a2ensite emploiplus-group.com
#    sudo apache2ctl configtest
#    sudo systemctl reload apache2
#
# 4. Vérifier:
#    curl -H "Host: emploiplus-group.com" http://localhost/api/_health
#
# 5. Vérifier aussi que le backend est lancé:
#    ps aux | grep node
#    netstat -tulpn | grep 5000
