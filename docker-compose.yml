# docker-compose.yml
# Orchestration Docker - Tous les services de l'application Emploi+
# Usage: sudo docker compose --env-file /home/emploiplus-group.com/public_html/backend/.env up -d --build

version: '3.9'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  db:
    image: postgres:15-alpine
    container_name: emploi_plus_db_cg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-emploi_plus_db_cg}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-emploi_plus_db_cg}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - emploi-network

  # ============================================================
  # Backend API
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: emploi_backend
    restart: unless-stopped
    # Chemin absolu vers le répertoire emploiplus-group.com
    env_file:
      - /home/emploiplus-group.com/public_html/backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-emploi_plus_db_cg}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://195.110.35.133}
      SITEMAP_TOKEN: ${SITEMAP_TOKEN}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      # On force l'utilisation du .env spécifiquement (priorité)
      - ./backend/.env:/app/.env
      # On protège les node_modules pour éviter qu'ils soient écrasés par le montage
      - /app/node_modules
      # Tes uploads et logs
      - uploads:/app/uploads
      - ./logs/backend:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - emploi-network

  # ============================================================
  # Frontend
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: emploi_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      # MODIFICATION : Passage en :rw pour permettre les ajustements Nginx non-root
      - /home/emploiplus-group.com/public_html/nginx/default.conf:/etc/nginx/conf.d/default.conf:rw

    deploy:
      update_config:
        order: start-first
    networks:
      - emploi-network

networks:
  emploi-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  nginx_logs:
    driver: local