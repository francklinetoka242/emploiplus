# docker-compose.yml
# Orchestration Docker - Tous les services de l'application Emploi Connect
# Usage: docker compose --env-file .env.docker up -d

version: '3.9'

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  db:
    image: postgres:15-alpine
    container_name: emploi_plus_db_cg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-emploi_plus_db_cg}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-emploi_plus_db_cg}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - emploi-network

  # ============================================================
  # Backend API
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      # ... (le reste reste identique)
    container_name: emploi_backend
    restart: unless-stopped
    env_file:             # 
      - ./backend/.env    # 
      - ./backend/.env.docker # 
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-emploi_plus_db_cg}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      SITEMAP_TOKEN: ${SITEMAP_TOKEN}
      BACKEND_PORT: ${BACKEND_PORT:-5000}
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app:delegated
      - /app/node_modules
      - uploads:/app/uploads
      - ./logs/backend:/app/logs:delegated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - emploi-network

  # ============================================================
  # Frontend
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
      cache_from:
        - emploi_frontend:latest
    container_name: emploi_frontend
    restart: unless-stopped
    # Attend que le backend soit 'Healthy' pour éviter le crash Nginx (host not found)
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      # Configuration Nginx
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Logs Nginx
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - emploi-network

networks:
  emploi-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  nginx_logs:
    driver: local