name: Deploy Emploi+ to VPS (Docker Mode)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          # Utilise SOIT password SOIT key selon ce que tu as mis dans tes secrets
          password: ${{ secrets.SSH_PASSWORD }} 
          # key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/public_html
            
            # 1. Force la mise à jour (évite les erreurs de conflit)
            git fetch origin
            git reset --hard origin/main
            
            # 2. Lancement Docker (on utilise le .env du backend que nous avons déjà corrigé)
            sudo docker compose --env-file backend/.env up -d --build
            
            # 3. Nettoyage
            sudo docker image prune -f
            
            echo "✅ Félicitations Francklin ! Emploi+ est à jour via Docker sur ton VPS."