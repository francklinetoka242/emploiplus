name: Deploy Emploi+ to VPS (Docker Mode)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/public_html
            
            # 1. Mise à jour du code depuis GitHub
            git pull origin main
            
            # 2. Lancement de la magie Docker
            # Cette commande fait tout : install, build et restart en arrière-plan
            sudo docker compose --env-file .env.docker up -d --build
            
            # 3. Nettoyage des anciennes images inutiles (pour gagner de la place)
            sudo docker image prune -f
            
            echo "✅ Félicitations Francklin ! Emploi+ est à jour via Docker sur ton VPS."