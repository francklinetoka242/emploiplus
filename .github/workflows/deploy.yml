name: Deploy Emploi+ to VPS

on:
  push:
    branches:
      - main  # Le déploiement se lance quand tu push sur la branche main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # password: ${{ secrets.SSH_PASSWORD }} # Utilise ceci si la clé SSH échoue
          script: |
            cd ~/public_html
            
            # 1. Mise à jour du code
            git pull origin main
            
            # 2. Installation Backend
            if [ -d "backend" ]; then
              cd backend
              npm install --production
              cd ..
            fi
            
            # 3. Installation et Build Frontend
            if [ -d "frontend" ]; then
              cd frontend
              npm install
              npm run build
              cd ..
            fi
            
            # 4. Redémarrage du serveur (PM2)
            # On essaie de restart, sinon on start le serveur
            pm2 restart all || pm2 start backend/server.js --name "emploiplus-api"
            
            echo "✅ Félicitations ! Emploi+ est à jour sur ton VPS."