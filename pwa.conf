# PWALayout Configuration

Ce fichier est généré automatiquement en analysant `frontend/src/components/layout/PWALayout.tsx` et ses composants enfants (`BottomNavigationBar`, `BottomNavigationGuest`, `HeaderMobile`, `HeaderMobileGuest`).
Il sert de référence technique pour implémenter une barre de navigation dynamique selon l'URL et l'état de l'application.

---

## 1. Structure du composant

```ts
interface PWALayoutProps {
  children: React.ReactNode;              // contenu principal de la page
  notificationCount?: number;            // nombre de notifications (badges)
  messageCount?: number;                 // nombre de messages (badges)
  hideNavigation?: boolean;              // true = masquer header + bottom nav mobile (pages d'auth)
  hideHeader?: boolean;                  // true = masquer uniquement le header mobile
}
```

- `children` : la page encadrée par le layout.
- `notificationCount` / `messageCount` sont propagés vers `HeaderMobile` et `BottomNavigationBar`.
- `hideNavigation` active un rendu complètement épuré (utile pour `/connexion`, `/inscription`, etc.).
- `hideHeader` masque seulement la barre haute (ex : pages avec barre de recherche dédiée).

Le layout utilise également ses propres états locaux :
- `isDrawerOpen` (boolean) contrôlé via `HeaderMobile.onDrawerOpen`.


## 2. Logique d'affichage

1. **Mobile only** : tous les éléments PWA sont enveloppés dans `md:hidden`.
2. **Header principal** :
   - rendu quand `!hideNavigation && !hideHeader && !showSecondaryHeader`.
   - choisit entre `HeaderMobile` (utilisateur connecté) et `HeaderMobileGuest`.
3. **Secondary Header** :
   - calculé via `showSecondaryHeader = !hideNavigation && !isMainPage`.
   - `isMainPage` est vrai si `location.pathname` correspond à l'un des `mainNavPaths` constants.
   - lorsque `showSecondaryHeader` est vrai, le header principal est remplacé par `<SecondaryHeader />`.
4. **Contenu principal** :
   - rendu dans un `<main>` avec un `padding-bottom` dynamique pour laisser de la place
     à la barre inférieure (si présente) et un `pt-14` si le secondary header est affiché.
   - les transitions de page sont animées (Framer Motion) en se basant sur `location.pathname`.
5. **Bottom Navigation** :
   - rendu si `!hideNavigation` quelle que soit la valeur de `hideHeader`.
   - affiche `BottomNavigationBar` pour un utilisateur auth et `BottomNavigationGuest` sinon.
   - la logique d'affichage/masquage interne (scroll, fab, badges) est gérée par le composant
     correspondant (voir section suivante).
6. **Drawer** :
   - uniquement pour utilisateurs authentifiés.
   - contrôlé par l'état local `isDrawerOpen`.

> **Décisions** : l'affichage des éléments repose à la fois sur des constantes (`mainNavPaths`),
> sur l'URL (`location.pathname`) et sur des props explicites passées par les pages.


## 3. Mapping des icônes

### 3.1. `BottomNavigationBar` (authentifié)

| Route                      | Icône Lucide     | Détails supplémentaires                     |
|---------------------------|------------------|---------------------------------------------|
| `/connexions`             | `Users`           | affiché seulement pour `role === "candidate"`|
| `/emplois`                | `Briefcase`       | candidat et invité                          |
| `/newsfeed`               | `Home`            | bouton FAB central (isFab=true)             |
| `/messages`               | `MessageSquare`   | badge = `messageCount`                      |
| `/profil`                 | `User`            | click ouvre le drawer (onDrawerOpen)        |
| `/recrutement`            | `BarChart3`       | seulement pour `role === "company"`       |
| `/candidats`              | `Search`          | entreprise seulement                        |
| `/settings`               | `User`            | remplace profil pour entreprise (ouvre drawer)|

- `isActive` est calculé par comparaison stricte de `location.pathname === path`.
- `onClickOverride` permet de substituer la navigation par un callback (drawer etc.).

### 3.2. `BottomNavigationGuest` (non-auth)

| Route            | Icône Lucide | Description            |
|------------------|--------------|------------------------|
| `/`              | `Home`       | Accueil                |
| `/emplois`       | `Briefcase`  | Emplois                |
| `/services`      | `Zap`        | Services               |
| `/formations`    | `BookOpen`   | Formations             |
| `/connexion`     | `LogIn`      | Connexion / Inscription|

- L'état actif se base sur `pathname.startsWith(path)` sauf pour `/`.

### 3.3. `HeaderMobile` / `HeaderMobileGuest`

- `HeaderMobile` utilise `Search`, `Bell`, `Menu`.
- `HeaderMobileGuest` utilise `Info`, `MoreVertical`, `Briefcase`.

Ces icônes sont liés à des actions (navigation ou ouverture de menu/search).


## 4. Gestion de l'état

- **Routing** : `useLocation` pour connaître la `pathname`; `useNavigate` pour changer de route.
- **Auth** : `useAuth()` retourne l'objet `user`; la présence de `user` conditionne
  l'affichage de versions auth/guest des éléments.
- **Rôle** : `useUserRole(user)` renvoie `role` («candidate», «company», …) utilisé par la barre.
- **Scroll** : `useScrollDirection(100)` renvoie `{ isVisible }` à `BottomNavigationBar`
  pour masquer la barre lors du scroll vers le bas.
- **Local state** : `useState` pour `isDrawerOpen` et le toggling du champ de recherche mobile.
- Aucun contexte global n'est utilisé pour la navigation : tout repose sur les hooks.


## 5. Conflits de fichiers

| Chemin                                         | Rôle                          |
|-----------------------------------------------|-------------------------------|
| `/src/components/layout/PWALayout.tsx`        | **exemple/ancêtre** ; contient un stub
| `/frontend/src/components/layout/PWALayout.tsx` | **version active** pour l'UI mobile. Importée
|                                               | depuis les pages via alias `@/...`.

La première version (sous le dossier racine `src`) est un simple exemple commenté
et n'est **pas référencée** dans le build frontend. Toute logique réelle se trouve
dans le fichier situé sous `frontend/src/...`; c'est celui-ci qui contrôle l'UI mobile.


## 6. Notes pour automatisation

- Pour modifier dynamiquement la barre selon l'URL, il faut lire `location.pathname`
  et comparer aux listes `mainNavPaths` ou aux `navigationItems` définies ci-dessus.
- Les props `hideNavigation`/`hideHeader` permettent le masquage manuel ; elles
  sont définies par les pages elles-mêmes (voir exemples dans `src/pages/*`).
- Les icônes étant importées de `lucide-react`, un script peut modifier simplement
  les objets `navigationItems` pour changer le `icon` ou le `path`.
- Les badges sont fournis par les props `notificationCount`/`messageCount`,
  potentiellement liés à un store Redux/Context externe.

---

Ce fichier devrait suffire à un autre assistant pour comprendre la structure,
prendre des décisions conditionnelles et transformer programmeusement la barre
de navigation mobile en fonction de l'utilisateur et de l'URL.
