# Configuration Nginx pour Emploi Connect
# Sert les assets statiques du frontend et proxy les appels API vers le backend

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Racine des fichiers statiques (SPA React)
    root /usr/share/nginx/html;
    index index.html;

    # Logs (optionnel - peut être désactivé en production)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # ============================================================
    # Sécurité - Headers HTTP importants
    # ============================================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ============================================================
    # Health Check Endpoint
    # ============================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================================
    # Proxy API Routes vers le Backend
    # ============================================================
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        
        # WebSocket support (si utilisé à l'avenir)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers importants pour le backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Évite la mise en cache des réponses API
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts pour les opérations longues (uploads, IA)
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # ============================================================
    # Uploads - Fichiers servis par le Backend
    # ============================================================
    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        
        # Cache les uploads (immutable par nature)
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        
        # Headers de sécurité pour les fichiers servis
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ============================================================
    # SPA React - Fallback sur index.html pour les routes
    # ============================================================
    # React Router gère le routing côté client
    # Si une route n'existe pas en tant que fichier, servir index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # Pas de cache pour index.html (toujours servir la version fraîche)
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ============================================================
    # Cache des Assets Vite (Avec hash dans le nom)
    # ============================================================
    # Les assets Vite incluent une hash dans leur nom (ex: main-ABC123.js)
    # Donc on peut les cacher longtemps sans risque
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header ETag "\"v1-permanent\"" always;
    }

    # ============================================================
    # Gestion des erreurs 404 et 405
    # ============================================================
    error_page 404 /index.html;
    error_page 405 =200 $uri;

    # ============================================================
    # Fichiers Sensibles - Bloquer l'accès
    # ============================================================
    location ~ /\. {
        # Bloquer les fichiers cachés (.git, .env, .htaccess, etc.)
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.git {
        deny all;
        access_log off;
    }

    location ~ \.(env|sql|yaml|yml|config)$ {
        deny all;
        access_log off;
    }

    # ============================================================
    # Optimisation - Gzip Compression
    # ============================================================
    # (Habituellement configuré dans nginx.conf principal)
    # gzip on;
    # gzip_types text/plain text/css text/javascript application/json application/javascript;
}

